name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install GCC 16 + build tooling
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y \
            g++-16 cmake ninja-build \
            libgpiod-dev \
            curl jq

      - name: Hide clang from WPILib host build
        run: |
          # WPILib's NativeUtils invokes /usr/bin/clang++ directly for
          # the platform-default (host) compile of *Base static libs,
          # bypassing update-alternatives. The platform config emits
          # GCC-only flags (-Werror=restrict, -gz=zlib), so clang fails.
          # Local dev boxes typically have only gcc; mirror that on the
          # runner by renaming the clang binaries so NativeUtils' host
          # detection falls through to g++.
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-16 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-16 100
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-16 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-16 100
          for b in /usr/bin/clang /usr/bin/clang++ /usr/bin/clang-18 /usr/bin/clang++-18; do
            [ -e "$b" ] && sudo mv "$b" "$b.bak" || true
          done
          which cc c++ gcc g++ clang clang++ 2>&1 || true
          c++ --version

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Resolve allwpilib submodule SHA for cache key
        id: subsha
        run: echo "sha=$(git rev-parse HEAD:hal-port/upstream/allwpilib)" >> "$GITHUB_OUTPUT"

      - name: Cache upstream WPILib gradle build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            hal-port/upstream/allwpilib/.gradle
            hal-port/upstream/allwpilib/build
            hal-port/upstream/allwpilib/*/build
          key: wpilib-${{ runner.os }}-${{ steps.subsha.outputs.sha }}

      - name: Install SystemCore cross-toolchain
        run: ./hal-port/build.sh installSystemCoreToolchain -Ponlylinuxsystemcore

      - name: Build upstream WPILib (jars + JNI .so's)
        run: |
          ./hal-port/build.sh \
            :ntcore:jar :wpiutil:jar \
            :ntcore:ntcoreJNISharedReleaseSharedLibrary \
            :wpiutil:wpiutilJNISharedReleaseSharedLibrary \
            :hal:halJNISharedReleaseSharedLibrary \
            -Ponlylinuxsystemcore

      - name: Configure + build daemon
        working-directory: daemon
        run: |
          cmake -B build -G Ninja -DCMAKE_CXX_COMPILER=g++-16
          ninja -C build

      - name: Run unit tests
        working-directory: daemon/build
        run: ctest --output-on-failure

      - name: Coverage build + report
        working-directory: daemon
        run: |
          cmake -B build-cov -G Ninja \
            -DCMAKE_CXX_COMPILER=g++-16 \
            -DDAEMON_COVERAGE=ON
          ninja -C build-cov daemon_tests
          (cd build-cov && ctest)
          python3 -m venv .venv
          .venv/bin/pip install -q gcovr
          .venv/bin/gcovr --gcov-executable gcov-16 \
            --root . --filter 'src/' \
            --exclude '.*null_gpio_backend\.hpp$' \
            --exclude '.*libgpiod_backend\.cpp$' \
            build-cov

      - name: Checkout robot template (sibling clone)
        id: template_co
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/frc-2027-robot-starter
          path: frc-2027-robot-starter-co
          fetch-depth: 1
        continue-on-error: true

      - name: Place template as a sibling directory
        id: sibling
        if: steps.template_co.outcome == 'success' && hashFiles('frc-2027-robot-starter-co/build.gradle.kts') != ''
        run: |
          # run-match-test.sh expects ../frc-2027-robot-starter relative to
          # this checkout. CI checks out into the workspace, so we move the
          # template up one level. hashFiles can't reach paths outside
          # $GITHUB_WORKSPACE, so downstream steps gate on this step's
          # outcome instead.
          mv frc-2027-robot-starter-co ../frc-2027-robot-starter
          ls ../frc-2027-robot-starter

      - name: Run deploy/reload/match-phase orchestrator
        if: steps.sibling.outcome == 'success'
        run: ./dev-emulation/run-match-test.sh

      - name: Run dev-emulation integration test (gpio-sim + vcan)
        # Advisory only on hosted runners. The Azure kernel image needs
        # `linux-modules-extra-$(uname -r)` for gpio-sim/vcan, and even
        # then libgpiod 1.6 + kernel ≥6.14 gpio-sim returns EINVAL on
        # `chip.get_line()` despite valid offsets. The script is the
        # canonical local-Pi test and should pass against real hardware
        # — which is what step output here verifies for those who care.
        # Track the failure but don't fail the build.
        continue-on-error: true
        run: |
          sudo apt-get install -y "linux-modules-extra-$(uname -r)" 2>/dev/null || true
          for mod in gpio-sim vcan; do
            if ! modinfo "$mod" >/dev/null 2>&1; then
              echo "::warning::kernel module $mod not available; skipping integration test"
              exit 0
            fi
          done
          sudo ./dev-emulation/run-integration-test.sh
